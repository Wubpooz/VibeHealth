<div class="w-full max-w-[390px] flex flex-col items-center">
<!-- Logo/Mascot Section -->
<div class="relative w-full flex flex-col items-center mb-10 pt-8">
<div class="w-32 h-32 mb-4 relative">
<img alt="VibeHealth Bunny Mascot" class="w-full h-full object-contain" data-alt="Friendly white bunny mascot waving hello" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDz-ElgBs7BuIhSa8B95l84AnHK_iNqrniV_bH0FiZgCqlfbNByvQwM03BTYud758b3gLNQ85fwHcpVLHCWoMGMJnQ65j_eoXBlDTUBBpZtWdrXcC-upRHRcTzcJqGHNvw67psdtG0p9L1_4_O_NaoYXi3pjnw4Ybz2uMtDV_KKWSkDweeFMdqB7_mbLGwIfEyHHP_eEWlNB1L5SaAqVW6nwIQgDhg8Di0rsRm86jgPdM3WNH6PB7e_tRx4TG2Jz1ykpx6-e-HxSUFg"/>

<p class="font-body text-on-surface-variant font-medium mt-1">Welcome back, Friend! 🐰</p>
</div>
<!-- Login Card -->
<div class="glass-panel w-full rounded-xl p-8 shadow-[0_24px_48px_rgba(28,27,28,0.06)] border border-outline-variant/15">
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary/40 transition-all font-body text-on-surface placeholder:text-outline/60" placeholder="bunny@vibehealth.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary/40 transition-all font-body text-on-surface placeholder:text-outline/60" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between px-1">
<label class="flex items-center space-x-2 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-5 w-5 rounded-md border-outline-variant bg-surface text-primary focus:ring-primary/20" type="checkbox"/>
</div>
<span class="text-sm font-medium text-on-surface-variant group-hover:text-primary transition-colors">Remember me</span>
</label>
<a class="text-sm font-bold text-primary hover:underline" href="#">Forgot?</a>
</div>
<!-- Primary CTA -->
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold text-lg rounded-full shadow-[0_8px_16px_rgba(185,5,56,0.2)] active:scale-95 transition-transform" type="submit">
                    Sign In
                </button>
<!-- Divider -->
<div class="relative py-4 flex items-center">
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
<span class="px-4 text-xs font-bold text-outline uppercase tracking-tighter">or continue with</span>
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-3 gap-4">
<button class="flex items-center justify-center py-3 bg-surface-container-low hover:bg-surface-container-high rounded-lg transition-colors border border-outline-variant/10" type="button">

</button>
<button class="flex items-center justify-center py-3 bg-surface-container-low hover:bg-surface-container-high rounded-lg transition-colors border border-outline-variant/10" type="button">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">ios</span>
</button>
<button class="flex items-center justify-center py-3 bg-surface-container-low hover:bg-surface-container-high rounded-lg transition-colors border border-outline-variant/10" type="button">
<img alt="GitHub" class="w-6 h-6 object-contain" data-alt="GitHub logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCW-qlBmChRm2Ee3SnDUdIBxrz1azAckcWuG5N7W4WZVipIOP-5-eYjMUnMrgdt3ud7eBeRx7zcLTHzeZk9EBIdgMt4Xk6AIWdHpONd0hmvIXFQYeTltJjjfj_PqnPN_fsh6qhIeGZtgs3E7mZhKKuosUnrcutqRULvEp5JbTTeA88KhOdZhIsD93OZqmGCoqAZMtvrLtna-OjDXhRYxTaUDKhrQ7HZ4MDrFuaeAiLBb_EBxdj_3-TrNbhQlxE0_f_J2L0X2BYHRUDG"/>
