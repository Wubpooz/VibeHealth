<!-- BEGIN: Interactive Logic -->
<script data-purpose="eye-movement">
    // Simple eye tracking to make the "eyes" look at the mouse cursor
    document.addEventListener('mousemove', (e) => {
      const eyes = document.querySelectorAll('.animate-blink');
      eyes.forEach(eye => {
        const rect = eye.getBoundingClientRect();
        const x = rect.left + (rect.width / 2);
        const y = rect.top + (rect.height / 2);
        const rad = Math.atan2(e.pageX - x, e.pageY - y);
        const rot = (rad * (180 / Math.PI) * -1) + 180;
        
        // Limit pupil movement within the container
        const distance = 8; // Max px movement
        const moveX = Math.sin(rad) * distance;
        const moveY = Math.cos(rad) * distance;
        
        eye.style.transform = `translate(${moveX}px, ${moveY}px)`;
      });
    });
  </script>
<!-- END: Interactive Logic -->
