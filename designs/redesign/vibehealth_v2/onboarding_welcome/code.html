</div>
<div class="absolute bottom-4 -left-6 bg-white p-3 rounded-xl shadow-lg shadow-black/5 -rotate-12">
<span class="material-symbols-outlined text-tertiary text-3xl">colors_spark</span>

</div>

<h1 class="font-headline text-5xl md:text-6xl font-extrabold text-primary tracking-tight leading-tight">
