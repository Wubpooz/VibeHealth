<aside class="sidebar">
  <!-- Brand Header -->
  <div class="sidebar-header">
    <h1 class="brand-title">VibeHealth</h1>
    <p class="brand-tagline">{{ 'SIDEBAR.BRAND_TAGLINE' | translate }}</p>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="nav-link"
          (click)="navItemClicked.emit()"
        >
        <div class="flex items-center gap-3">
          <mat-icon class="material-symbols-rounded nav-icon">{{ item.icon }}</mat-icon>
          <span class="nav-label">{{ item.labelKey | translate }}</span>
        </div>
        </a>
      }
    </mat-nav-list>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    <!-- Carrot Counter -->
    <div class="sidebar-carrot-counter mb-3">
      <app-carrot-counter variant="default"></app-carrot-counter>
    </div>
    <!-- Theme Switcher -->
    <div class="theme-switcher">
      <button
        type="button"
        class="theme-button"
        [class.active]="currentTheme() === 'light'"
        (click)="setTheme('light')"
        [attr.aria-label]="'SIDEBAR.THEME_LIGHT' | translate"
        [attr.aria-pressed]="currentTheme() === 'light'"
      >
        <mat-icon class="material-symbols-rounded" aria-hidden="true">light_mode</mat-icon>
        <span class="theme-label">{{ 'SIDEBAR.THEME_LIGHT' | translate }}</span>
      </button>
      <button
        type="button"
        class="theme-button"
        [class.active]="currentTheme() === 'dark'"
        (click)="setTheme('dark')"
        [attr.aria-label]="'SIDEBAR.THEME_DARK' | translate"
        [attr.aria-pressed]="currentTheme() === 'dark'"
      >
        <mat-icon class="material-symbols-rounded" aria-hidden="true">dark_mode</mat-icon>
        <span class="theme-label">{{ 'SIDEBAR.THEME_DARK' | translate }}</span>
      </button>
      <button
        type="button"
        class="theme-button"
        [class.active]="currentTheme() === 'system'"
        (click)="setTheme('system')"
        [attr.aria-label]="'SIDEBAR.THEME_SYSTEM' | translate"
        [attr.aria-pressed]="currentTheme() === 'system'"
      >
        <mat-icon class="material-symbols-rounded" aria-hidden="true">computer</mat-icon>
        <span class="theme-label">{{ 'SIDEBAR.THEME_SYSTEM' | translate }}</span>
      </button>
    </div>

    <!-- User Section -->
    <div class="user-section">
      <button
        type="button"
        class="user-profile-button"
        (click)="navItemClicked.emit(); goToProfile()"
        [attr.aria-label]="'SIDEBAR.VIEW_PROFILE' | translate"
      >
        <div class="user-avatar">
          <img class="user-avatar-img" [src]="mockAvatarUrl" alt="User avatar" />
        </div>
        <span class="user-name">{{ userName() }}</span>
      </button>

      <button
        type="button"
        class="icon-button"
        (click)="navItemClicked.emit(); goToSettings()"
        [attr.aria-label]="'nav.settings' | translate"
      >
        <mat-icon class="material-symbols-rounded" aria-hidden="true">settings</mat-icon>
      </button>

      <button
        type="button"
        class="icon-button"
        (click)="navItemClicked.emit(); logout()"
        [attr.aria-label]="'SIDEBAR.LOGOUT' | translate"
      >
        <mat-icon class="material-symbols-rounded" aria-hidden="true">logout</mat-icon>
      </button>
    </div>
  </div>
</aside>
