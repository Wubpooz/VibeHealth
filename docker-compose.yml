version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: vibehealth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vibehealth
      POSTGRES_PASSWORD: vibehealth_dev
      POSTGRES_DB: vibehealth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibehealth"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vibehealth-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://vibehealth:vibehealth_dev@postgres:5432/vibehealth
      PORT: 3000
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: bun run dev

  # Frontend (Angular PWA)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vibehealth-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_URL: http://backend:3000
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run start

volumes:
  postgres_data:
